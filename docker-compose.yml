services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ferrum_gate
      POSTGRES_PASSWORD: ferrum_gate
      POSTGRES_USER: ferrum_gate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrum_gate -d ferrum_gate"]
      interval: 10s
      timeout: 5s
      retries: 5
