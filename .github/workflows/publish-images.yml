name: Publish Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: ferrum-gate-gateway-http
            dockerfile: docker/backend.Dockerfile
            build_args: APP_BIN=gateway-http
          - image_name: ferrum-gate-tenant-api
            dockerfile: docker/backend.Dockerfile
            build_args: APP_BIN=tenant-api
          - image_name: ferrum-gate-control-plane
            dockerfile: docker/backend.Dockerfile
            build_args: APP_BIN=control-plane
          - image_name: ferrum-gate-nginx
            dockerfile: docker/nginx.Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase registry owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

